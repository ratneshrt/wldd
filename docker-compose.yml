version: "3.8"

services:

  api:
    build: .
    container_name: wldd-mini-task
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tasktracker
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=wlddisbest

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"